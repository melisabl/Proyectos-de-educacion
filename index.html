<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificador de Polígonos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
.container { max-width: 480px; margin: 0 auto; }
h1 { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #777; margin-bottom: 16px; }
.score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.score-pill { font-size: 13px; color: #555; background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 4px 14px; }
.progress { display: flex; gap: 6px; margin-bottom: 16px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
.dot.active { background: #888; }
.dot.ok { background: #5a9e2f; }
.dot.fail { background: #d94f4f; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.fig-header { font-size: 12px; color: #999; margin-bottom: 12px; }
.canvas-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
canvas { border: 1px solid #eee; border-radius: 10px; background: #fafafa; }
.btn-row { display: flex; gap: 10px; }
.btn-choice { flex: 1; padding: 11px 0; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #333; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; }
.btn-choice:hover { background: #f5f5f5; }
.btn-choice:active { transform: scale(0.97); }
.btn-choice.correct { background: #eaf3de; border-color: #5a9e2f; color: #2e6010; }
.btn-choice.wrong { background: #fceaea; border-color: #d94f4f; color: #a02020; }
.btn-choice.reveal { background: #f5f5f5; border-color: #ddd; color: #aaa; }
.feedback { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 500; }
.feedback.ok { color: #2e6010; }
.feedback.fail { color: #a02020; }
.finish { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 32px 20px; text-align: center; }
.finish h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.finish p { font-size: 14px; color: #777; margin-bottom: 20px; }
.btn-restart { padding: 10px 28px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #333; font-size: 14px; cursor: pointer; }
.btn-restart:hover { background: #f5f5f5; }
</style>
</head>
<body>
<div class="container">
  <div class="score-bar">
    <div>
      <h1>¿Es un polígono cóncavo o convexo?</h1>
      <div class="subtitle">Clasificá cada figura</div>
    </div>
    <span class="score-pill" id="score-pill">0 / 0</span>
  </div>
  <div class="progress" id="progress"></div>
  <div id="game-area"></div>
</div>

<script>
const figures = [
  { label: "Hexágono", answer: "convexo", color: "#3B6D11",
    pts: [[60,120],[120,80],[200,80],[260,120],[200,160],[120,160]] },
  { label: "Rectángulo", answer: "convexo", color: "#185FA5",
    pts: [[60,80],[240,80],[240,160],[60,160]] },
  { label: "Triángulo", answer: "convexo", color: "#BA7517",
    pts: [[160,60],[260,180],[60,180]] },
  { label: "Pentágono", answer: "convexo", color: "#7F77DD",
    pts: [[160,60],[240,110],[210,190],[110,190],[80,110]] },
  { label: "Rombo", answer: "convexo", color: "#185FA5",
    pts: [[160,60],[240,130],[160,200],[80,130]] },
  { label: "Flecha (derecha)", answer: "cóncavo", color: "#d94f4f",
    pts: [[60,90],[180,90],[180,60],[260,130],[180,200],[180,170],[60,170]] },
  { label: "Forma en L", answer: "cóncavo", color: "#3B6D11",
    pts: [[60,60],[140,60],[140,130],[240,130],[240,190],[60,190]] },
  { label: "Flecha (izquierda)", answer: "cóncavo", color: "#185FA5",
    pts: [[260,90],[140,90],[140,60],[60,130],[140,200],[140,170],[260,170]] },
  { label: "Forma con entrada", answer: "cóncavo", color: "#7F77DD",
    pts: [[60,60],[240,60],[240,170],[160,120],[80,170]] },
  { label: "Estrella de 5 puntas", answer: "cóncavo", color: "#BA7517",
    pts: (()=>{
      const cx=160,cy=125,R=90,r=38,pts=[];
      for(let i=0;i<10;i++){
        const a=Math.PI/2+i*Math.PI/5;
        const rad=i%2===0?R:r;
        pts.push([cx+rad*Math.cos(a), cy-rad*Math.sin(a)]);
      }
      return pts;
    })()
  },
];

let order=[], current=0, correct=0, results=[];

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function init(){
  order=shuffle(figures.map((_,i)=>i));
  current=0; correct=0; results=[];
  renderProgress();
  renderFigure();
  document.getElementById('score-pill').textContent='0 / 0';
}

function renderProgress(){
  const el=document.getElementById('progress');
  el.innerHTML=order.map((_,i)=>{
    let cls='dot';
    if(i<results.length) cls+=results[i]?' ok':' fail';
    else if(i===current) cls+=' active';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function drawPoly(canvas, pts, color){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const scaleX=(W-40)/(maxX-minX), scaleY=(H-40)/(maxY-minY);
  const scale=Math.min(scaleX,scaleY);
  const offX=(W-(maxX-minX)*scale)/2-minX*scale;
  const offY=(H-(maxY-minY)*scale)/2-minY*scale;
  ctx.beginPath();
  pts.forEach(([x,y],i)=>{
    const px=x*scale+offX, py=y*scale+offY;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.closePath();
  ctx.strokeStyle=color;
  ctx.lineWidth=2.5;
  ctx.stroke();
  ctx.fillStyle=color+'18';
  ctx.fill();
}

function renderFigure(){
  const area=document.getElementById('game-area');
  if(current>=order.length){ renderFinish(); return; }
  const fig=figures[order[current]];
  area.innerHTML=`
    <div class="card">
      <div class="fig-header">Figura ${current+1} de ${order.length}</div>
      <div class="canvas-wrap"><canvas id="poly-canvas" width="320" height="240"></canvas></div>
      <div class="btn-row">
        <button class="btn-choice" id="btn-conv" onclick="answer('convexo')">Convexo</button>
        <button class="btn-choice" id="btn-conc" onclick="answer('cóncavo')">Cóncavo</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>`;
  drawPoly(document.getElementById('poly-canvas'), fig.pts, fig.color);
}

function answer(choice){
  const fig=figures[order[current]];
  const ok=choice===fig.answer;
  if(ok) correct++;
  results.push(ok);
  const btnConv=document.getElementById('btn-conv');
  const btnConc=document.getElementById('btn-conc');
  const fb=document.getElementById('feedback');
  [btnConv,btnConc].forEach(b=>{ b.onclick=null; b.classList.add('reveal'); });
  const chosen=choice==='convexo'?btnConv:btnConc;
  const right=fig.answer==='convexo'?btnConv:btnConc;
  if(ok){
    chosen.classList.remove('reveal'); chosen.classList.add('correct');
    fb.className='feedback ok'; fb.textContent='¡Correcto!';
  } else {
    chosen.classList.remove('reveal'); chosen.classList.add('wrong');
    right.classList.remove('reveal'); right.classList.add('correct');
    fb.className='feedback fail'; fb.textContent=`No, esta figura es ${fig.answer}.`;
  }
  document.getElementById('score-pill').textContent=`${correct} / ${results.length}`;
  renderProgress();
  setTimeout(()=>{ current++; renderFigure(); renderProgress(); }, 1400);
}

function renderFinish(){
  const pct=Math.round(correct/order.length*100);
  const msg=pct===100?'¡Perfecto! ¡Clasificaste todo correctamente!':pct>=70?'¡Muy bien! Ya sabés distinguirlos.':'¡Seguí practicando, vas a poder!';
  document.getElementById('game-area').innerHTML=`
    <div class="finish">
      <h3>${correct} de ${order.length} correctas</h3>
      <p>${msg}</p>
      <button class="btn-restart" onclick="init()">Jugar de nuevo</button>
    </div>`;
  document.getElementById('score-pill').textContent=`${correct} / ${order.length}`;
}

init();
</script>
</body>
</html>
